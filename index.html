<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>水揚げ予定表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #1a5fc4; display: flex; flex-direction: column; }
.app { width: 100%; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }

.header { background: linear-gradient(135deg, #1a5fc4 0%, #0d3d8a 100%); color: #fff; padding: 12px 14px 10px; flex-shrink: 0; }
.header-top { font-size: 13px; opacity: 0.85; margin-bottom: 2px; }
.header-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
.header-today { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }

.nav-row { display: flex; align-items: center; gap: 10px; padding-right: 10px; }
.btn-nav { font-size: 13px; font-weight: 600; padding: 10px 8px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.btn-nav:active { background: rgba(255,255,255,0.3); }
.btn-nav.current { background: #f0a500; border-color: #f0a500; }
.spacer { flex: 1; min-width: 4px; }
.month-label { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.4; text-align: right; flex-shrink: 0; white-space: pre; }
.btn-cal { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.btn-cal:active { background: rgba(255,255,255,0.3); }
.btn-refresh { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; -webkit-tap-highlight-color: transparent; }
.btn-refresh:active { background: rgba(255,255,255,0.3); }

.table-header { background: #0d3d8a; flex-shrink: 0; }
.table-header table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.table-header thead th { font-size: 14px; color: rgba(255,255,255,0.9); font-weight: 600; padding: 8px 2px 8px 10px; text-align: left; }
.table-header thead th.col-mark,
.table-header thead th.col-qty,
.table-header thead th.col-tank { text-align: center; }

.table-body { flex: 1; overflow-y: auto; background: #fff; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; touch-action: pan-y; }
.table-body table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.table-body tbody tr { border-bottom: 1px solid #eef0f3; }
.table-body tbody tr:last-child { border-bottom: none; }
.table-body tbody tr:active { background: #f5f8ff; }
.table-body tbody td { padding: 12px 2px 12px 10px; color: #1a1a1a; vertical-align: middle; font-size: 17px; overflow: hidden; }

.col-date { width: 12%; }
.col-day  { width: 7%; }
.col-mark { width: 20.25%; text-align: center; }
.col-qty  { width: 20.25%; text-align: center; font-size: 21px; font-weight: 600; }
.col-tank { width: 20.25%; text-align: center; }
.col-note { width: 20.25%; }

.day-sat { color: #1a5fc4; font-weight: 400; }
.day-sun { color: #c43030; font-weight: 400; }
.row-sat { background: #f0f6ff; }
.row-sun { background: #fff5f5; }

.mark-aitai { display: inline-block; background: #e6f7ee; color: #1a8f60; font-size: 15px; font-weight: 700; padding: 3px 6px; border-radius: 6px; border: 1.5px solid #1a8f60; white-space: nowrap; }
.mark-jojo  { display: inline-block; background: #e6f0ff; color: #1a5fc4; font-size: 15px; font-weight: 700; padding: 3px 6px; border-radius: 6px; border: 1.5px solid #1a5fc4; white-space: nowrap; }

.note-text { font-size: 14px; color: #e07800; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

.loading { text-align: center; padding: 50px 20px; color: #888; font-size: 16px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; z-index: 10; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 36px; width: 100%; }
.modal-handle { width: 40px; height: 4px; background: #d0d0cc; border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 14px; }
.year-grid { display: flex; gap: 10px; margin-bottom: 18px; }
.month-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.sel-btn { font-size: 16px; font-weight: 600; padding: 11px 0; border-radius: 10px; border: 1.5px solid #d0d0cc; background: #fff; color: #333; cursor: pointer; text-align: center; flex: 1; -webkit-tap-highlight-color: transparent; }
.sel-btn:active { background: #f0f0ee; }
.sel-btn.selected { background: #1a5fc4; color: #fff; border-color: #1a5fc4; }
.modal-close { margin-top: 14px; width: 100%; font-size: 15px; font-weight: 600; padding: 13px; border-radius: 10px; border: 1.5px solid #d0d0cc; background: #f5f5f3; color: #555; cursor: pointer; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">女川魚市場　ギンザケ</div>
    <div class="header-title">阿部功（出島カネ木）<br>水揚げ予定表</div>
    <div class="header-today" id="today-disp"></div>
    <div class="nav-row">
      <button class="btn-nav" onclick="changeMonth(-1)">◀前月</button>
      <button class="btn-nav current" onclick="goToday()">当月</button>
      <button class="btn-nav" onclick="changeMonth(1)">翌月▶</button>
      <span class="spacer"></span>
      <span class="month-label" id="month-label"></span>
      <button class="btn-cal" onclick="openModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
          <line x1="5" y1="1.5" x2="5" y2="4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="11" y1="1.5" x2="11" y2="4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
      <button class="btn-refresh" onclick="refreshData()" title="最新データに更新">🔄</button>
    </div>
  </div>

  <div class="table-header">
    <table>
      <thead>
        <tr>
          <th class="col-date">日付</th>
          <th class="col-day">曜</th>
          <th class="col-mark">水揚</th>
          <th class="col-qty">数量(t)</th>
          <th class="col-tank">生簀</th>
          <th class="col-note">備考</th>
        </tr>
      </thead>
    </table>
  </div>

  <div class="table-body" id="table-body-scroll">
    <table>
      <tbody id="tbody">
        <tr><td colspan="6" class="loading">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<div class="modal-bg" id="modal-bg" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-step-label">年を選択</div>
    <div id="modal-year-area" class="year-grid"></div>
    <div id="modal-month-area" class="month-grid" style="display:none"></div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx9yvsMB5vzSX_rnKveQu-KqVXejnLEsFq5A2QAudRj8uVPGPuNL9JwaAmPS0DPeTeyaQ/exec';

const today = new Date();
let cur = { y: today.getFullYear(), m: today.getMonth() + 1 };
let selYear = null;
const MONTHS = [3,4,5,6,7];
const cache = {};

function formatToday() {
  const w = ['日','月','火','水','木','金','土'][today.getDay()];
  return '本日：' + today.getFullYear() + '/' + (today.getMonth()+1) + '/' + today.getDate() + '（' + w + '）';
}

function refreshData() {
  Object.keys(cache).forEach(function(key) { delete cache[key]; });
  render(cur.y, cur.m);
}

function render(year, month) {
  document.getElementById('month-label').textContent = year + '年\n' + month + '月';
  document.getElementById('today-disp').textContent = formatToday();

  const cacheKey = year + '-' + month;
  if (cache[cacheKey]) {
    handleData(cache[cacheKey]);
    return;
  }

  document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="loading">読み込み中...</td></tr>';

  fetch(GAS_URL + '?year=' + year + '&month=' + month)
    .then(function(res) { return res.json(); })
    .then(function(rows) {
      cache[cacheKey] = rows;
      handleData(rows);
    })
    .catch(function(err) {
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="6" class="loading">エラーが発生しました</td></tr>';
    });
}

function handleData(rows) {
  const tb = document.getElementById('tbody');
  if (!rows || rows.length === 0) {
    tb.innerHTML = '<tr><td colspan="6" class="loading">データがありません</td></tr>';
    return;
  }
  tb.innerHTML = '';
  rows.forEach(function(r) {
    const isSat = r.day === '土';
    const isSun = r.day === '日';
    const dayClass = isSun ? 'day-sun' : isSat ? 'day-sat' : '';
    const rowClass = isSun ? 'row-sun' : isSat ? 'row-sat' : '';
    let markHtml = '';
    if (r.mark === '相対') markHtml = '<span class="mark-aitai">相対</span>';
    else if (r.mark === '上場') markHtml = '<span class="mark-jojo">上場</span>';
    const qtyHtml = (r.qty !== '' && r.qty !== null) ? r.qty + ' t' : '';
    const noteHtml = r.note ? '<span class="note-text">'+r.note+'</span>' : '';
    const tr = document.createElement('tr');
    if (rowClass) tr.className = rowClass;
    tr.innerHTML =
      '<td class="col-date">'+r.date+'</td>' +
      '<td class="col-day '+dayClass+'">'+r.day+'</td>' +
      '<td class="col-mark">'+markHtml+'</td>' +
      '<td class="col-qty">'+qtyHtml+'</td>' +
      '<td class="col-tank">'+r.tank+'</td>' +
      '<td class="col-note">'+noteHtml+'</td>';
    tb.appendChild(tr);
  });
  document.getElementById('table-body-scroll').scrollTop = 0;
}

function changeMonth(d) {
  cur.m += d;
  if (cur.m > 12) { cur.m = 1; cur.y++; }
  if (cur.m < 1)  { cur.m = 12; cur.y--; }
  render(cur.y, cur.m);
}
function goToday() {
  cur = { y: today.getFullYear(), m: today.getMonth() + 1 };
  render(cur.y, cur.m);
}

function openModal() {
  selYear = null;
  document.getElementById('modal-step-label').textContent = '年を選択';
  const area = document.getElementById('modal-year-area');
  area.innerHTML = '';
  const cy = today.getFullYear();
  for (let i = 0; i < 3; i++) {
    const y = cy - i;
    const b = document.createElement('button');
    b.className = 'sel-btn';
    b.textContent = y + '年';
    b.onclick = (function(yr){ return function(){ selectYear(yr); }; })(y);
    area.appendChild(b);
  }
  document.getElementById('modal-year-area').style.display = 'flex';
  document.getElementById('modal-month-area').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
}

function selectYear(y) {
  selYear = y;
  document.getElementById('modal-step-label').textContent = y + '年 — 月を選択';
  document.querySelectorAll('#modal-year-area .sel-btn').forEach(function(b) {
    b.classList.toggle('selected', b.textContent === y + '年');
  });
  const ma = document.getElementById('modal-month-area');
  ma.innerHTML = '';
  MONTHS.forEach(function(mo) {
    const b = document.createElement('button');
    b.className = 'sel-btn';
    b.textContent = mo + '月';
    b.onclick = (function(m){ return function(){ cur={y:selYear,m:m}; render(selYear,m); closeModal(); }; })(mo);
    ma.appendChild(b);
  });
  ma.style.display = 'grid';
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modal-bg')) closeModal(); }

render(cur.y, cur.m);
</script>
</body>
</html>
